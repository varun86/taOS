    - App Store Platform: design/app-store-platform.md
    - App Streaming: design/app-streaming.md
    - Container Runtime: design/container-runtime-abstraction.md
    - Desktop Shell: design/desktop-shell.md
    - Distributed Compute: design/distributed-compute-cluster.md
    - Framework-Agnostic Runtime: design/framework-agnostic-runtime.md
    - Lobby Chat Room: design/lobby-chat-room.md
    - Message Hub Core: design/message-hub-core.md
    - Model Torrent Mesh: design/model-torrent-mesh.md
    - Resource Scheduler: design/resource-scheduler.md
    - Skills and Plugins: design/skills-plugins.md
    - Training and Conversion: design/training-conversion-capabilities.md
    - User Memory: design/user-memory.md
  - Plans:
    - Agent Deployer: design/plan-agent-deployer.md
    - App Streaming Foundation: design/plan-app-streaming-foundation.md
    - Complete and Polish: design/plan-complete-and-polish.md
    - Container Runtime: design/plan-container-runtime.md
    - Desktop Mobile View: design/plan-desktop-mobile-view.md
    - Desktop OS Apps: design/plan-desktop-os-apps.md
    - Desktop Shell Core: design/plan-desktop-shell-core.md
    - Hardware and App Registry: design/plan-hardware-appregistry.md
