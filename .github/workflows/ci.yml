name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    # 3.11 is consistently the slowest matrix leg (~25-30 min) — the
    # SPA-build drop in this PR only saved ~1.5 min, so the previous
    # 45-min cap stays. Future investigation: figure out why 3.11 is
    # ~10 min slower than 3.12/3.13 and whether dropping it is OK.
    timeout-minutes: 45
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # SPA bundle is stubbed by tests/conftest.py — see pytest_configure.
      # The real build is exercised in the spa-build job below.

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/e2e

      - name: Verify app starts
        run: python -c "from tinyagentos.app import create_app; print('OK')"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check for syntax errors
        run: python -m compileall tinyagentos/ -q

  spa-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install + build SPA
        run: |
          cd desktop
          npm ci --silent
          npm run build
