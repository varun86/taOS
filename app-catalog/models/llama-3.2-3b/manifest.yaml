id: llama-3.2-3b
name: Llama 3.2 3B
type: model
version: 3.2.0
description: Meta's edge model — explicit ARM support, tool calling, 6GB RAM. Great
  for mobile/Pi workers.
homepage: https://huggingface.co/meta-llama/Llama-3.2-3B-Instruct
capabilities:
- chat
- tool-calling
variants:
- id: q4_k_m
  name: Q4_K_M (2GB)
  format: gguf
  size_mb: 2000
  min_ram_mb: 4096
  download_url: https://huggingface.co/bartowski/Llama-3.2-3B-Instruct-GGUF/resolve/main/Llama-3.2-3B-Instruct-Q4_K_M.gguf
  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 4096
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 4096
hardware_tiers:
  arm-npu-16gb:
    recommended: q4_k_m
  arm-cpu-8gb:
    recommended: q4_k_m
  x86-cuda-8gb:
    recommended: q4_k_m
  x86-vulkan-4gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
context_window: 131072
