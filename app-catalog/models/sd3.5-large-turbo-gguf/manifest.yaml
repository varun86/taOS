id: sd3.5-large-turbo-gguf
name: Stable Diffusion 3.5 Large Turbo (GGUF)
type: model
version: 3.5.0
description: Stability AI's SD3.5 Large Turbo — 4-step high quality generation
homepage: https://huggingface.co/city96/stable-diffusion-3.5-large-turbo-gguf
license: Stability AI Community License
capabilities:
- image-generation
variants:
- id: q4_0
  name: Q4_0 GGUF (4.6GB)
  format: gguf
  size_mb: 4600
  min_ram_mb: 8192
  download_url: https://huggingface.co/city96/stable-diffusion-3.5-large-turbo-gguf/resolve/main/sd3.5_large_turbo-Q4_0.gguf
  requires:
    backends:
    - id: stable-diffusion-cpp
      targets:
      - cpu
      min_ram_mb: 8192
    - id: comfyui
      targets:
      - x86-cuda
      - x86-vulkan
      - apple-silicon
      min_ram_mb: 8192
hardware_tiers:
  arm-cpu-8gb:
    recommended: null
    warning: Q4_0 needs ~8GB RAM for weights + T5 encoders — tight/OOM on 8GB ARM
  arm-cpu-16gb:
    recommended: q4_0
    warning: Slow on ARM CPU — 3-6 minutes per image even with 4-step turbo
  arm-npu-16gb:
    recommended: q4_0
    warning: Runs on RK3588 CPU only (no NPU support), 3-6 minutes per image
  x86-cpu-8gb:
    recommended: q4_0
    warning: Tight on 8GB — expect swapping with T5 encoder loaded
  x86-cpu-16gb:
    recommended: q4_0
    warning: Slow on CPU — 1-3 minutes per image
  x86-vulkan-8gb:
    recommended: q4_0
    warning: Fits — Vulkan backend for SD3 is partial, may fall back to CPU for some
      ops
  x86-cuda-8gb:
    recommended: q4_0
  x86-cuda-12gb:
    recommended: q4_0
  apple-silicon:
    recommended: q4_0
    notes: Runs well on 16GB+ M-series via stable-diffusion.cpp Metal
  cpu-only:
    recommended: q4_0
    warning: Slow — 2-4 minutes per image
context_window: 256
