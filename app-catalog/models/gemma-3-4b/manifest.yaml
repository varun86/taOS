id: gemma-3-4b
name: Gemma 3 4B Instruct
type: model
version: 3.0.0
description: Google's Gemma 3 4B — multimodal, multilingual, 128K context
homepage: https://huggingface.co/google/gemma-3-4b-it
license: Gemma Terms of Use
capabilities:
- chat
- vision
- multilingual
variants:
- id: q4_k_m
  name: Q4_K_M (2.5GB)
  format: gguf
  size_mb: 2500
  min_ram_mb: 4096
  download_url: https://huggingface.co/unsloth/gemma-3-4b-it-GGUF/resolve/main/gemma-3-4b-it-Q4_K_M.gguf
  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 4096
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 4096
hardware_tiers:
  arm-cpu-8gb:
    recommended: q4_k_m
  arm-cpu-16gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  x86-cuda-8gb:
    recommended: q4_k_m
  x86-vulkan-4gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
context_window: 128000
