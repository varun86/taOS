      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 4096
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 4096
hardware_tiers:
  arm-cpu-8gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  x86-cuda-8gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
  x86-cuda-4gb:
    recommended: q4_k_m
context_window: 4096
