id: nemotron-mini-4b
name: Nemotron Mini 4B Instruct
type: model
version: 1.0.0
description: NVIDIA's 4B fine-tune of Minitron — strong roleplay and function calling
homepage: https://huggingface.co/nvidia/Nemotron-Mini-4B-Instruct
license: NVIDIA Open Model License
capabilities:
- chat
- tool-calling
variants:
- id: q4_k_m
  name: Q4_K_M (2.7GB)
  format: gguf
  size_mb: 2700
  min_ram_mb: 4096
