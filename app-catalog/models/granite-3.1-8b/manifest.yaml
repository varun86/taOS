id: granite-3.1-8b
name: IBM Granite 3.1 8B Instruct
type: model
version: 3.1.0
description: IBM's 8B enterprise model — 128K context, Apache 2.0 commercial-safe
homepage: https://huggingface.co/ibm-granite/granite-3.1-8b-instruct
license: Apache-2.0
capabilities:
- chat
- tool-calling
- code
- reasoning
variants:
- id: q4_k_m
  name: Q4_K_M (4.9GB)
  format: gguf
  size_mb: 4900
  min_ram_mb: 6144
