  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 6144
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 6144
hardware_tiers:
  arm-cpu-16gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  x86-cuda-8gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
context_window: 32768
