id: qwen3-vl-4b-rkllm
name: Qwen 3 VL 4B Instruct (RKLLM)
type: model
version: 3.0.0
description: RK3588 NPU-accelerated Qwen 3 VL 4B — vision-language multimodal model
  with stronger capability for Orange Pi NPU
homepage: https://huggingface.co/reponislam/Qwen3-VL-4B-Instruct-w8a8-RK3588-rkllm
license: Apache-2.0
capabilities:
- chat
- vision
variants:
- id: w8a8
  name: W8A8 RKLLM (4.9GB, NPU)
  format: rkllm
  size_mb: 4850
  min_ram_mb: 0
  download_url: https://huggingface.co/reponislam/Qwen3-VL-4B-Instruct-w8a8-RK3588-rkllm/resolve/main/qwen3-vl-4b-instruct_w8a8_rk3588.rkllm
  requires_npu:
  - rk3588
  quality: good
  requires:
    backends:
    - id: rkllama
      targets:
      - rockchip
      min_ram_mb: 2048
hardware_tiers:
  arm-npu-16gb:
    recommended: w8a8
  arm-npu-32gb:
    recommended: w8a8
