id: smollm2-360m
name: SmolLM2 360M Instruct
type: model
version: 2.0.0
description: Tiny 360M — sweet spot for edge classifier/router tasks, runs on Pi 3
homepage: https://huggingface.co/HuggingFaceTB/SmolLM2-360M-Instruct
license: Apache-2.0
capabilities:
- chat
variants:
- id: q4_k_m
  name: Q4_K_M (230MB)
  format: gguf
  size_mb: 230
  min_ram_mb: 1024
  download_url: https://huggingface.co/bartowski/SmolLM2-360M-Instruct-GGUF/resolve/main/SmolLM2-360M-Instruct-Q4_K_M.gguf
  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 1024
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 1024
hardware_tiers:
  arm-cpu-8gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
context_window: 8192
