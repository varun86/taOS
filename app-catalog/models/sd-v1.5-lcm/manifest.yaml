  requires:
    backends:
    - id: stable-diffusion-cpp
      targets:
      - cpu
      min_ram_mb: 5120
- id: safetensors
  name: Safetensors FP16 (4.3GB)
  format: safetensors
  size_mb: 4300
  min_ram_mb: 5120
