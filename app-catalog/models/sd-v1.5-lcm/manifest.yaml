id: sd-v1.5-lcm
name: Stable Diffusion 1.5 (GGUF)
type: model
version: 1.5.0
description: Classic Stable Diffusion 1.5 in GGUF format — works on any CPU via stable-diffusion.cpp,
  including ARM
homepage: https://huggingface.co/second-state/stable-diffusion-v1-5-GGUF
license: OpenRAIL-M
capabilities:
- image-generation
variants:
- id: q4_0
  name: Q4_0 GGUF (900MB, CPU)
  format: gguf
  size_mb: 900
  min_ram_mb: 2048
