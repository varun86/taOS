  sha256: ''
  quality: acceptable
  requires:
    backends:
    - id: stable-diffusion-cpp
      targets:
      - cpu
      min_ram_mb: 2048
- id: q8_0
  name: Q8_0 GGUF (1.7GB, CPU/GPU)
  format: gguf
  size_mb: 1700
  min_ram_mb: 4096
  download_url: https://huggingface.co/second-state/stable-diffusion-v1-5-GGUF/resolve/main/stable-diffusion-v1-5-pruned-emaonly-Q8_0.gguf
  quality: better
  requires:
    backends:
    - id: stable-diffusion-cpp
      targets:
      - cpu
      min_ram_mb: 4096
- id: f16
  name: F16 GGUF (3.2GB, GPU)
  format: gguf
  size_mb: 3200
  min_ram_mb: 5120
  download_url: https://huggingface.co/second-state/stable-diffusion-v1-5-GGUF/resolve/main/stable-diffusion-v1-5-pruned-emaonly-f16.gguf
