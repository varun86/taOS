id: granite-3.1-2b
name: IBM Granite 3.1 2B Instruct
type: model
version: 3.1.0
description: IBM's 2B enterprise model — 128K context, Apache 2.0, strong at code
  and structured tasks
homepage: https://huggingface.co/ibm-granite/granite-3.1-2b-instruct
license: Apache-2.0
capabilities:
- chat
- tool-calling
- code
variants:
- id: q4_k_m
  name: Q4_K_M (1.5GB)
  format: gguf
  size_mb: 1500
  min_ram_mb: 2560
  download_url: https://huggingface.co/bartowski/granite-3.1-2b-instruct-GGUF/resolve/main/granite-3.1-2b-instruct-Q4_K_M.gguf
  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 2560
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 2560
hardware_tiers:
  arm-cpu-8gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  x86-vulkan-4gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
context_window: 32768
