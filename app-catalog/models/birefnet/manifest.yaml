id: birefnet
name: BiRefNet (Background Removal)
type: model
version: 1.0.0
description: State-of-the-art bilateral reference network — high-quality matting and
  segmentation
homepage: https://huggingface.co/ZhengPeng7/BiRefNet
license: MIT
capabilities:
- background-removal
variants:
- id: safetensors
  name: Safetensors (885MB)
  format: safetensors
  size_mb: 885
  min_ram_mb: 2048
  download_url: https://huggingface.co/ZhengPeng7/BiRefNet/resolve/main/model.safetensors
  requires:
    backends:
    - id: transformers
      targets:
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 2048
hardware_tiers:
  arm-cpu-8gb:
    recommended: safetensors
  arm-npu-16gb:
    recommended: safetensors
  x86-cuda-8gb:
    recommended: safetensors
  cpu-only:
    recommended: safetensors
  x86-cuda-2gb:
    recommended: safetensors
context_window: 1
