id: phi-4
name: Phi 4 (14B)
type: model
version: 4.0.0
description: Microsoft's 14B — trained on synthetic data, strong reasoning and math
homepage: https://huggingface.co/microsoft/phi-4
license: MIT
capabilities:
- chat
- code
- reasoning
- math
variants:
- id: q4_k_m
  name: Q4_K_M (9GB)
  format: gguf
  size_mb: 9000
  min_ram_mb: 11264
