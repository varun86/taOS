      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 11264
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 11264
hardware_tiers:
  arm-cpu-16gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  x86-cuda-12gb:
    recommended: q4_k_m
  x86-vulkan-8gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
    notes: Slow on CPU
context_window: 16384
