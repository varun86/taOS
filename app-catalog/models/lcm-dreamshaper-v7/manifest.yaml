    - id: diffusers
      targets:
      - cpu
      min_ram_mb: 4096
    - id: comfyui
      targets:
      - x86-cuda
      - x86-vulkan
      - apple-silicon
      min_ram_mb: 4096
    - id: sd-webui
      targets:
      - cpu
      min_ram_mb: 4096
hardware_tiers:
  arm-cpu-16gb:
