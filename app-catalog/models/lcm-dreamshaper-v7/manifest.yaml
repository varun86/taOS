  arm-npu-16gb:
    recommended: safetensors
  arm-npu-32gb:
    recommended: safetensors
  x86-cpu-16gb:
    recommended: safetensors
  x86-cuda-8gb:
    recommended: safetensors
  x86-cuda-12gb:
    recommended: safetensors
  apple-silicon:
    recommended: safetensors
