id: snowflake-arctic-embed-s
name: Snowflake Arctic Embed S
type: model
version: 1.0.0
description: Snowflake's 33M English embedding, 384-dim, CPU-friendly, strong retrieval
homepage: https://huggingface.co/Snowflake/snowflake-arctic-embed-s
license: Apache-2.0
capabilities:
- embedding
variants:
- id: q4_k_m
  name: Q4_K_M GGUF (27MB)
  format: gguf
  size_mb: 27
  min_ram_mb: 256
  download_url: https://huggingface.co/ChristianAzinn/snowflake-arctic-embed-s-gguf/resolve/main/snowflake-arctic-embed-s--Q4_K_M.GGUF
  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 256
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 256
- id: f16
  name: F16 GGUF (64MB)
  format: gguf
  size_mb: 64
  min_ram_mb: 512
  download_url: https://huggingface.co/ChristianAzinn/snowflake-arctic-embed-s-gguf/resolve/main/snowflake-arctic-embed-s-f16.GGUF
  requires:
    backends:
    - id: ollama
      targets:
      - apple-silicon
      - x86-cuda
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 512
    - id: llama-cpp
      targets:
      - x86-vulkan
      - arm-vulkan
      - cpu
      min_ram_mb: 512
hardware_tiers:
  arm-cpu-8gb:
    recommended: q4_k_m
  arm-npu-16gb:
    recommended: q4_k_m
  cpu-only:
    recommended: q4_k_m
context_window: 512
