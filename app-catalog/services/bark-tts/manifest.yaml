id: bark-tts
name: Bark TTS
type: service
category: voice
version: 1.0.0
description: "Suno's transformer-based TTS with non-verbal sounds (laughs, sighs), multilingual prosody, and emotive speech."
homepage: https://github.com/suno-ai/bark
license: MIT

requires:
  ram_mb: 6144
  python: ">=3.10"

install:
  method: pip
  package: suno-bark

hardware_tiers:
  arm-npu-16gb: degraded
  arm-npu-32gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: degraded
  cpu-only: degraded
  apple-silicon: full
