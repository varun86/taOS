id: tesseract-ocr
name: Tesseract OCR
type: service
category: productivity
version: 5.3.4
description: "Classic OCR engine — fast, lightweight, 100+ languages. The baseline for plain text extraction from images and scans."
homepage: https://github.com/tesseract-ocr/tesseract
license: Apache-2.0

requires:
  ram_mb: 256
  disk_mb: 200

install:
  method: apt
  package: tesseract-ocr

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  arm-cpu-8gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  cpu-only: full
  apple-silicon: full
