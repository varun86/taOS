id: searxng
name: SearXNG
type: service
category: infrastructure
version: 2024.12.0
description: "Privacy-respecting metasearch engine — powers AI search tools like Perplexica"
homepage: https://github.com/searxng/searxng
license: AGPL-3.0

requires:
  ram_mb: 128
  disk_mb: 200

install:
  method: docker
  image: searxng/searxng:latest
  volumes:
    - config:/etc/searxng
  # 8080 is the container-internal port; the host port is allocated from the
  # managed pool (30000-40000) by the installer — never bound to 8080 on the host.
  ports: [8080]

hardware_tiers:
  arm-npu-16gb: full
  arm-npu-32gb: full
  x86-cuda-12gb: full
  x86-vulkan-8gb: full
  x86-vulkan-4gb: full
  cpu-only: full
